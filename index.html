<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kommercieel — We Build GTM Engines</title>
    <meta name="description" content="We build go-to-market engines for B2B SaaS companies. Outbound infrastructure, data enrichment, and pipeline automation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F9F8F6;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 540px;
            text-align: center;
        }

        .logo {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            line-height: 1.15;
            color: #1a1a1a;
            margin-bottom: 1.25rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.125rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2.5rem;
        }

        .cta {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: #1a1a1a;
            color: #F9F8F6;
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .cta:hover {
            background: #333;
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8125rem;
            color: #aaa;
        }

        .footer a {
            color: #888;
            text-decoration: none;
        }

        .footer a:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Kommercieel</div>
        <h1>We build GTM engines.</h1>
        <p>Outbound infrastructure, data enrichment, and pipeline automation for B2B SaaS companies that want predictable growth.</p>
        <a href="https://calendly.com/rickvandenkommer/new-meeting" class="cta">Book a 15-min discovery call</a>
    </div>
    <div class="footer">
        <a href="mailto:rick@kommercieel.com">rick@kommercieel.com</a>
    </div>
</body>
</html>

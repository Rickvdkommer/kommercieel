        body {
            font-family: 'Inter', -apple-system, sans-serif;

        .container {
            max-width: 540px;

        }

        .logo {

            font-weight: 500;
            letter-spacing: 0.12em;

            color: #888;
            margin-bottom: 3rem;

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);

            line-height: 1.15;

            margin-bottom: 1.25rem;

            font-size: 1.125rem;

            color: #555;

        }

        .cta {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: #1a1a1a;
            color: #F9F8F6;
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .cta:hover {
            background: #333;
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8125rem;
            color: #aaa;
        }

        .footer a {
            color: #888;
            text-decoration: none;
        }

        .footer a:hover {
            color: #555;
        }

        .top-link {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #888;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .top-link:hover {
            color: #1a1a1a;
            border-color: #999;
